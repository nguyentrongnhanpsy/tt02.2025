        function TabQuiz() {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [selectedAns, setSelectedAns] = useState(null);
          const [isAnswered, setIsAnswered] = useState(false);
          const [showResult, setShowResult] = useState(false);
          const [wrongAnswers, setWrongAnswers] = useState([]);
          const [reviewMode, setReviewMode] = useState(false);

          const questions = reviewMode ? wrongAnswers : QUIZ_DATA;
          const q = questions[currentQ];

          const handleAnswer = (index) => {
            if (isAnswered) return;
            setSelectedAns(index);
            setIsAnswered(true);

            if (index === q.ans) {
              if (!reviewMode) setScore(score + 1);
            } else {
              if (!reviewMode) setWrongAnswers([...wrongAnswers, q]);
            }
          };

          const handleNext = () => {
            if (currentQ < questions.length - 1) {
              setCurrentQ(currentQ + 1);
              setSelectedAns(null);
              setIsAnswered(false);
            } else {
              setShowResult(true);
            }
          };

          const restart = () => {
            setCurrentQ(0);
            setScore(0);
            setSelectedAns(null);
            setIsAnswered(false);
            setShowResult(false);
            setWrongAnswers([]);
            setReviewMode(false);
          };

          const startReview = () => {
            setCurrentQ(0);
            setSelectedAns(null);
            setIsAnswered(false);
            setShowResult(false);
            setReviewMode(true);
          };

          if (showResult) {
            const percent = Math.round((score / QUIZ_DATA.length) * 100);
            const isPass = percent >= 80;
            
            return (
              <div className="animate-fade-in-up text-center py-10">
                <div className={`mx-auto w-24 h-24 rounded-full flex items-center justify-center mb-6 shadow-xl ${isPass ? 'bg-green-100 text-green-500' : 'bg-red-100 text-red-500'}`}>
                  {isPass ? <IconAward className="w-12 h-12" /> : <IconAlertCircle className="w-12 h-12" />}
                </div>
                <h2 className="text-3xl font-bold mb-2 text-gray-800">
                  {isPass ? "Chúc mừng bạn đã hoàn thành xuất sắc!" : "Cần cố gắng thêm nhé!"}
                </h2>
                <p className="text-xl text-gray-600 mb-8">
                  Đúng <span className="font-bold text-blue-600">{score}</span> / {QUIZ_DATA.length} câu ({percent}%)
                </p>

                <div className="flex justify-center gap-4">
                  <button onClick={restart} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition flex items-center gap-2">
                    <IconRefreshCcw className="w-5 h-5"/> Làm lại từ đầu
                  </button>
                  {wrongAnswers.length > 0 && (
                    <button onClick={startReview} className="px-6 py-3 bg-rose-100 text-rose-700 rounded-xl font-medium hover:bg-rose-200 transition flex items-center gap-2">
                      <IconPlay className="w-5 h-5"/> Ôn tập {wrongAnswers.length} câu sai
                    </button>
                  )}
                </div>
              </div>
            );
          }

          return (
            <div className="animate-fade-in-up max-w-3xl mx-auto">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                  {reviewMode ? <span className="text-rose-600">Chế độ Ôn lỗi sai</span> : <span>Bài Kiểm tra Thông tư 02</span>}
                </h2>
                <span className="bg-gray-100 text-gray-600 px-4 py-1 rounded-full font-medium text-sm">
                  Câu {currentQ + 1} / {questions.length}
                </span>
              </div>

              <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-200 mb-6 relative overflow-hidden">
                {/* Progress bar */}
                <div className="absolute top-0 left-0 h-1 bg-gray-100 w-full">
                  <div className="h-full bg-blue-500 transition-all duration-300" style={{ width: `${((currentQ + 1) / questions.length) * 100}%` }}></div>
                </div>
                
                <h3 className="text-lg font-semibold text-gray-800 mb-6 mt-2 leading-relaxed">
                  {q.q}
                </h3>
                
                <div className="space-y-3">
                  {q.options.map((opt, index) => {
                    let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 font-medium ";
                    
                    if (!isAnswered) {
                      btnClass += "border-gray-200 hover:border-blue-400 hover:bg-blue-50 text-gray-700";
                    } else {
                      if (index === q.ans) {
                        btnClass += "border-green-500 bg-green-50 text-green-800 shadow-md transform scale-[1.01]"; // Correct
                      } else if (index === selectedAns) {
                        btnClass += "border-red-500 bg-red-50 text-red-800"; // Wrong selected
                      } else {
                        btnClass += "border-gray-100 bg-gray-50 text-gray-400 opacity-50"; // Others
                      }
                    }

                    return (
                      <button 
                        key={index} 
                        onClick={() => handleAnswer(index)}
                        className={btnClass}
                        disabled={isAnswered}
                      >
                        {opt}
                      </button>
                    );
                  })}
                </div>

                {/* Feedback Area */}
                {isAnswered && (
                  <div className={`mt-6 p-4 rounded-xl border ${selectedAns === q.ans ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'} animate-fade-in-up`}>
                    <p className={`font-bold mb-1 ${selectedAns === q.ans ? 'text-green-700' : 'text-red-700'}`}>
                      {selectedAns === q.ans ? '🎉 Chính xác!' : '❌ Rất tiếc, câu trả lời chưa đúng.'}
                    </p>
                    <p className="text-gray-700 text-sm"><strong>Giải thích:</strong> {q.exp}</p>
                  </div>
                )}
              </div>

              <div className="flex justify-end">
                <button 
                  onClick={handleNext}
                  disabled={!isAnswered}
                  className={`px-8 py-3 rounded-xl font-semibold transition-all ${
                    isAnswered 
                    ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg' 
                    : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                  }`}
                >
                  {currentQ < questions.length - 1 ? 'Câu tiếp theo ➔' : 'Xem kết quả chung cuộc'}
                </button>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
