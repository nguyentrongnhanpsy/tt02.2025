        // --- AUDIO ENGINE (Web Audio API) ---
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playTone = (freq, type, time, duration, vol) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + time);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime + time);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + time + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + time);
            osc.stop(audioCtx.currentTime + time + duration);
        };

                <div className="flex justify-between items-center border-b border-gray-100 pb-3 mb-6">
                  <span className="text-gray-500 font-bold uppercase tracking-wider text-sm flex items-center gap-2">
                      <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Bản xem trước Word
                  </span>
                </div>
                
                <div id="lesson-plan-preview" className="font-serif text-[13pt] text-black bg-white">
                  {/* Nội dung mẫu giữ nguyên như trước để đảm bảo chuẩn form Word */}
                  <div style={{ textAlign: 'center', fontWeight: 'bold', marginBottom: '20px' }}>
                    KẾ HOẠCH BÀI DẠY MÔN {formData.subject.toUpperCase()} LỚP {formData.grade}<br/>
                    (Theo Công văn {formData.template})
                  </div>
                  <div style={{ fontWeight: 'bold' }}>TÊN BÀI DẠY: {formData.lessonName || '........................................'}</div>
                  <div>Môn học/Hoạt động giáo dục: {formData.subject}; lớp: {formData.grade}</div>
                  <div>Thời gian thực hiện: ..... tiết</div>
                  <div style={{ fontWeight: 'bold', marginTop: '15px' }}>I. YÊU CẦU CẦN ĐẠT</div>
                  <div><span style={{ fontWeight: 'bold' }}>1. Về năng lực đặc thù:</span> Giải quyết nội dung: {formData.content || '........................................'}</div>
                  <div><span style={{ fontWeight: 'bold' }}>2. Về năng lực số (Tích hợp TT02):</span> Học sinh vận dụng các công cụ kỹ thuật số để giải quyết nhiệm vụ học tập.</div>
                  <div><span style={{ fontWeight: 'bold' }}>3. Về phẩm chất:</span> Chăm chỉ, trách nhiệm trong môi trường số.</div>
                  <div style={{ fontWeight: 'bold', marginTop: '15px' }}>II. THIẾT BỊ DẠY HỌC VÀ HỌC LIỆU SỐ</div>
                  <div>- Giáo viên: Máy tính, máy chiếu, tài liệu số.</div>
                  <div>- Học sinh: Thiết bị thông minh, tài khoản truy cập.</div>
                  <div style={{ fontWeight: 'bold', marginTop: '15px' }}>III. TIẾN TRÌNH DẠY HỌC</div>
                  <table style={{ width: '100%', borderCollapse: 'collapse', marginTop: '10px' }} border="1">
                    <thead>
                      <tr>
                        <th style={{ padding: '5px', textAlign: 'center' }}>Hoạt động</th>
                        <th style={{ padding: '5px', textAlign: 'center' }}>Mục tiêu</th>
                        <th style={{ padding: '5px', textAlign: 'center' }}>Nội dung/Năng lực số</th>
                        <th style={{ padding: '5px', textAlign: 'center' }}>Sản phẩm</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr><td style={{ padding: '5px' }}>1. Mở đầu</td><td style={{ padding: '5px' }}>Tạo hứng thú</td><td style={{ padding: '5px' }}>Truy cập Quizizz</td><td style={{ padding: '5px' }}>Kết quả game</td></tr>
                      <tr><td style={{ padding: '5px' }}>2. Hình thành KT mới</td><td style={{ padding: '5px' }}>Nắm bắt {formData.lessonName}</td><td style={{ padding: '5px' }}>Tìm kiếm thông tin (NL 1.1)</td><td style={{ padding: '5px' }}>Phiếu học tập</td></tr>
                      <tr><td style={{ padding: '5px' }}>3. Luyện tập/Vận dụng</td><td style={{ padding: '5px' }}>Thực hành</td><td style={{ padding: '5px' }}>Nộp bài qua LMS</td><td style={{ padding: '5px' }}>Bài làm hoàn thiện</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        }

        function TabQuiz() {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [selectedAns, setSelectedAns] = useState(null);
          const [isAnswered, setIsAnswered] = useState(false);
          const [showResult, setShowResult] = useState(false);
          const [wrongAnswers, setWrongAnswers] = useState([]);
          const [reviewMode, setReviewMode] = useState(false);
          const [animState, setAnimState] = useState(''); // For correct/wrong animation

          const questions = reviewMode ? wrongAnswers : QUIZ_DATA;
          const q = questions[currentQ];

          const handleAnswer = (index) => {
            if (isAnswered) return;
            setSelectedAns(index);
            setIsAnswered(true);

            if (index === q.ans) {
              SOUNDS.correct();
              setAnimState('animate-bounce-slight');
              if (!reviewMode) setScore(score + 1);
            } else {
              SOUNDS.wrong();
              setAnimState('animate-shake');
              if (!reviewMode) setWrongAnswers([...wrongAnswers, q]);
            }
            
            // Reset animation state after it finishes
            setTimeout(() => setAnimState(''), 500);
          };

          const handleNext = () => {
            SOUNDS.click();
            if (currentQ < questions.length - 1) {
              setCurrentQ(currentQ + 1);
              setSelectedAns(null);
              setIsAnswered(false);
            } else {
              setShowResult(true);
              if (score / QUIZ_DATA.length >= 0.8) SOUNDS.correct(); // Extra sound for passing
            }
          };

          const restart = () => {
            SOUNDS.click();
            setCurrentQ(0);
            setScore(0);
            setSelectedAns(null);
            setIsAnswered(false);
            setShowResult(false);
            setWrongAnswers([]);
            setReviewMode(false);
          };

          const startReview = () => {
            SOUNDS.click();
            setCurrentQ(0);
            setSelectedAns(null);
            setIsAnswered(false);
            setShowResult(false);
            setReviewMode(true);
          };

          if (showResult) {
            const percent = Math.round((score / QUIZ_DATA.length) * 100);
            const isPass = percent >= 80;
            
            return (
              <div className="animate-fade-in-up text-center py-16 bg-white rounded-[2rem] shadow-xl shadow-gray-200/50 max-w-3xl mx-auto border border-gray-100">
                <div className={`mx-auto w-28 h-28 rounded-[2rem] flex items-center justify-center mb-8 shadow-2xl ${isPass ? 'bg-gradient-to-br from-green-400 to-emerald-600 text-white shadow-green-500/40' : 'bg-gradient-to-br from-rose-400 to-red-600 text-white shadow-red-500/40'} animate-bounce-slight`}>
                  {isPass ? <IconAward className="w-14 h-14" /> : <IconAlertCircle className="w-14 h-14" />}
                </div>
                <h2 className="text-4xl font-extrabold mb-3 text-gray-800 tracking-tight">
                  {isPass ? "Tuyệt vời! Hoàn thành xuất sắc!" : "Cần cố gắng thêm nhé!"}
                </h2>
                <p className="text-xl text-gray-500 mb-10 font-medium">
                  Kết quả: <span className={`font-bold text-2xl ${isPass ? 'text-green-500' : 'text-red-500'}`}>{score}</span> / {QUIZ_DATA.length} câu ({percent}%)
                </p>

                <div className="flex justify-center gap-4 flex-wrap px-4">
                  <button onClick={restart} className="px-8 py-4 bg-gray-100 text-gray-700 rounded-2xl font-bold hover:bg-gray-200 hover:-translate-y-1 transition-all flex items-center gap-2 active:scale-95">
                    <IconRefreshCcw className="w-5 h-5"/> Thi lại từ đầu
                  </button>
                  {wrongAnswers.length > 0 && (
                    <button onClick={startReview} className="px-8 py-4 bg-gradient-to-r from-rose-500 to-red-500 text-white rounded-2xl font-bold hover:shadow-lg hover:shadow-red-500/30 hover:-translate-y-1 transition-all flex items-center gap-2 active:scale-95">
                      <IconPlay className="w-5 h-5"/> Ôn lại {wrongAnswers.length} câu sai
                    </button>
                  )}
                </div>
              </div>
            );
          }

          return (
            <div className="max-w-3xl mx-auto">
              <div className="flex justify-between items-center mb-8">
                <h2 className="text-2xl font-extrabold text-gray-800 flex items-center gap-3">
                  {reviewMode ? (
                    <><span className="flex items-center justify-center w-8 h-8 rounded-full bg-rose-100 text-rose-600"><IconAlertCircle className="w-5 h-5"/></span> Chế độ Ôn tập lỗi sai</>
                  ) : (
                    <><span className="flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 text-blue-600"><IconCheckCircle className="w-5 h-5"/></span> Bài Kiểm tra Thông tư 02</>
                  )}
                </h2>
                <span className="bg-gray-100 text-gray-600 px-5 py-1.5 rounded-full font-bold text-sm shadow-inner">
                  Câu {currentQ + 1} / {questions.length}
                </span>
              </div>

              <div className={`bg-white p-8 md:p-10 rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-100 mb-8 relative overflow-hidden ${animState}`}>
                {/* Progress bar */}
                <div className="absolute top-0 left-0 h-1.5 bg-gray-100 w-full">
                  <div className={`h-full transition-all duration-500 ${reviewMode ? 'bg-rose-500' : 'bg-blue-500'}`} style={{ width: `${((currentQ + 1) / questions.length) * 100}%` }}></div>
                </div>
                
                <h3 className="text-xl font-bold text-gray-800 mb-8 mt-2 leading-relaxed">
                  {q.q}
                </h3>
                
                <div className="space-y-4">
                  {q.options.map((opt, index) => {
                    let btnClass = "w-full text-left p-5 rounded-2xl border-2 transition-all duration-200 font-medium ";
                    
                    if (!isAnswered) {
                      btnClass += "border-gray-100 bg-gray-50/50 hover:border-blue-300 hover:bg-blue-50 text-gray-700 hover:-translate-y-1 hover:shadow-md";
                    } else {
                      if (index === q.ans) {
                        btnClass += "border-green-500 bg-green-50 text-green-800 shadow-lg shadow-green-500/20 transform scale-[1.02] z-10 relative"; 
                      } else if (index === selectedAns) {
                        btnClass += "border-red-400 bg-red-50 text-red-800"; 
                      } else {
                        btnClass += "border-gray-100 bg-gray-50 text-gray-400 opacity-50"; 
                      }
                    }

                    return (
                      <button 
                        key={index} 
                        onClick={() => handleAnswer(index)}
                        className={btnClass}
                        disabled={isAnswered}
                      >
                        {opt}
                      </button>
                    );
                  })}
                </div>

                {/* Feedback Area */}
                <div className={`mt-8 p-5 rounded-2xl border overflow-hidden transition-all duration-500 ${isAnswered ? 'max-h-40 opacity-100' : 'max-h-0 opacity-0 border-transparent p-0 mt-0'} ${selectedAns === q.ans ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                    <p className={`font-extrabold mb-2 flex items-center gap-2 ${selectedAns === q.ans ? 'text-green-700' : 'text-red-700'}`}>
                      {selectedAns === q.ans ? '🎉 Xuất sắc!' : '❌ Rất tiếc!'}
                    </p>
                    <p className="text-gray-700 text-sm leading-relaxed"><strong className="opacity-80">Giải thích:</strong> {q.exp}</p>
                </div>
              </div>

              <div className="flex justify-end">
                <button 
                  onClick={handleNext}
                  disabled={!isAnswered}
                  className={`px-8 py-4 rounded-2xl font-bold transition-all flex items-center gap-2 active:scale-95 ${
                    isAnswered 
                    ? 'bg-gray-800 text-white hover:bg-black shadow-xl shadow-gray-800/30 hover:-translate-y-1' 
                    : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                  }`}
                >
                  {currentQ < questions.length - 1 ? 'Chuyển sang câu tiếp theo ➔' : 'Xem kết quả chung cuộc ➔'}
                </button>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
